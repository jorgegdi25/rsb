name: Build and publish for Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Publish dist to production branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: production
          folder: dist
          clean: true
          single-commit: true
