name: Build and publish for Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production site
        run: npm run build

      - name: Check out production branch
        uses: actions/checkout@v6
        with:
          ref: production
          path: production-branch
          fetch-depth: 0

      - name: Publish dist to production branch
        run: |
          find production-branch -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R dist/. production-branch/

          cd production-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No production changes to publish"
            exit 0
          fi

          git commit -m "Deploy production build"
          git push origin HEAD:production
