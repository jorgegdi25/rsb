name: Build and publish for Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production site
        run: npm run build

      - name: Publish dist to production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/production-dist
          cp -R dist /tmp/production-dist

          git checkout --orphan production-deploy
          git rm -rf .
          cp -R /tmp/production-dist/. .
          git add -A

          git commit -m "Deploy production build"
          git push origin production-deploy:production --force
