name: Build and publish for Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production site
        run: npm run build

      - name: Publish dist to production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin production || true

          rm -rf /tmp/production-branch

          if git ls-remote --exit-code --heads origin production; then
            git worktree add /tmp/production-branch origin/production
          else
            git worktree add -B production /tmp/production-branch HEAD
          fi

          find /tmp/production-branch -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +

          rsync -a --delete dist/ /tmp/production-branch/

          cd /tmp/production-branch
          git checkout -B production
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy production build"
          git push origin production --force
